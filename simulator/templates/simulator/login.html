<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | Native Immersion Simulator</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-slate-950 text-slate-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-slate-900 border border-slate-800 rounded-2xl p-8 max-w-md w-full shadow-2xl">
        <div class="text-center mb-6">
            <span class="text-3xl">🔑</span>
            <h1 class="text-2xl font-black text-white mt-2">Bon retour !</h1>
            <p class="text-slate-400 text-xs mt-1">Connecte-toi pour accéder à ton espace</p>
        </div>

        <form method="POST" class="space-y-4">
            {% csrf_token %}

            {% for field in form %}
            <div>
                <label class="block text-xs font-semibold text-slate-300 uppercase tracking-wider mb-1">{{ field.label}}
                </label>
                {{ field }}
                {% for error in field.errors %}
                <p class="text-xs text-rose-400 mt-1">{{ error }}</p>
                {% endfor %}
            </div>
            {% endfor %}

            <button type="submit"
                class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2.5 px-4 rounded-xl transition cursor-pointer mt-4">
                Se connecter
            </button>
        </form>

        <p class="text-center text-xs text-slate-400 mt-6">
            Pas encore de compte ? <a href="{% url 'register' %}"
                class="text-indigo-400 hover:underline font-semibold">S'inscrire</a>
        </p>
    </div>

    <!-- Script pour injecter les classes Tailwind sur les inputs Django -->
    <script>
        document.querySelectorAll('input').forEach(input => {
            if (input.type !== 'checkbox' && input.type !== 'submit') {
                input.className = 'w-full bg-slate-950 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-100 focus:outline-none focus:border-indigo-500 transition';
            }
        });
        document.querySelectorAll('.errorlist').forEach(el => {
            el.className = 'text-xs text-rose-400 space-y-1 mt-1';
        });
    </script>
</body>

</html>
